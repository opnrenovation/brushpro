[build]
builder = "nixpacks"
buildCommand = "npm install --include=dev && (find .next/cache -mindepth 1 -delete 2>/dev/null || true) && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[variables]
PORT = "3000"
NODE_ENV = "production"
